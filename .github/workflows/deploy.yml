# CI/CD for Ezconn Backend
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ezconn-backend
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build and Deploy to Cloud Run'
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --add-cloudsql-instances dynamic-inventory-replenish:us-east1:dynamic-inventory \
            --set-env-vars="NODE_ENV=production,DATABASE_URL=mysql://root:talhashah@localhost/ezconn_db?socket=/cloudsql/dynamic-inventory-replenish:us-east1:dynamic-inventory,APP_KEY=ezconn_secret_2024,SESSION_LIFETIME=120,JWT_SECRET=ezconn_secret_key_2024_safe_and_long,AWS_REGION=us-east-1,AWS_BUCKET=ezconn-prod-storage,AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
